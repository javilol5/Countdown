<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cuenta atrás Open Madrid Acro</title>
<style>
body{
    background:#0b0b0f;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:50px;
}
input{
    padding:10px;
    font-size:16px;
}
button{
    padding:10px 15px;
    font-size:16px;
    margin-left:5px;
}
.intervalo{
    font-size:55px;
    margin-top:20px;
    color:#008000;
}
#mensaje{
    margin-top:20px;
    font-size:20px;
    color:#ffd54f;
}
#contadorTitulo, #intervaloTitulo {
    font-size:25px;
    margin-top:20px;
    color:#ffffff;
}
#relojIntervalo{
    font-size:60px;
    margin-top:15px;
    color:#ff6f00;
}
</style>
</head>
<body>

<h2>Cuenta atrás Open Madrid Acro</h2>

<input id="nombre" placeholder="Tu nombre">
<button onclick="iniciar()">Entrar</button>

<div id="mensaje"></div>

<div class="intervalo" id="contadorTitulo" style="display:none">Cuenta atrás hasta el OPEN de Madrid</div>
<div class="intervalo" id="contador" style="display:none"></div>

<div class="intervalo" id="intervaloTitulo" style="display:none">Horas restantes de entreno</div>
<div class="reloj" id="relojIntervalo" style="display:none"></div>

<script>
// Fecha objetivo
var fechaObjetivo = new Date("March 27, 2026 13:00:00").getTime()

// Lista de nombres y mensajes
var lista = {
    "carla":"Carla, Zuri y Atteneri",
    "zuri":"Carla, Zuri y Atteneri",
    "atteneri":"Carla, Zuri y Atteneri",
    "ainara":"Ainara, Sara e Isis",
    "sara":"Ainara, Sara e Isis",
    "isis":"Ainara, Sara e Isis",
    "marta":"Marta, Aitana y Leire",
    "aitana":"Marta, Aitana y Leire",
    "leire":"Marta, Aitana y Leire",
    "sofia":"Sofia, Elena y Alicia",
    "helena":"Sofia, Helena y Alicia",
    "elena":"Sofia, Elena y Alicia",
    "alicia":"Sofia, Elena y Alicia",
    "javi":"Javi y Martina",
    "martina":"Javi y Martina"
}

// Intervalos por grupo
var intervalosGrupos = {
    "1_2":[
        {dias:[1,2,4,5], inicio:"18:00", fin:"21:00"},
        {dias:[6], inicio:"10:00", fin:"14:00"}
    ],
    "3_4_5_6":[
        {dias:[2,4,5], inicio:"18:00", fin:"21:00"},
        {dias:[6], inicio:"11:00", fin:"14:00"}
    ]
}

// Levenshtein
function similitud(a,b){
    var distancia = levenshtein(a,b)
    var max = Math.max(a.length,b.length)
    return 1 - distancia/max
}
function levenshtein(a,b){
    var matriz = []
    for(var i=0;i<=b.length;i++){matriz[i]=[i]}
    for(var j=0;j<=a.length;j++){matriz[0][j]=j}
    for(var i=1;i<=b.length;i++){
        for(var j=1;j<=a.length;j++){
            if(b.charAt(i-1)==a.charAt(j-1)){
                matriz[i][j]=matriz[i-1][j-1]
            }else{
                matriz[i][j]=Math.min(
                    matriz[i-1][j-1]+1,
                    matriz[i][j-1]+1,
                    matriz[i-1][j]+1
                )
            }
        }
    }
    return matriz[b.length][a.length]
}


// Convierte segundos a HH:MM:SS
function segundosAHHMMSS(segundos){
    var hh = Math.floor(segundos/3600).toString().padStart(2,'0')
    var mm = Math.floor((segundos%3600)/60).toString().padStart(2,'0')
    var ss = (segundos%60).toString().padStart(2,'0')
    return hh + ":" + mm + ":" + ss
}

// Calcula segundos restantes en intervalos futuros
function segundosRestantesIntervalos(fechaLimite, diasSemanaPermitidos, intervalo){
    var ahora = new Date();
    var totalSegs = 0;
    var fechaActual = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate(), 0,0,0);
    while(fechaActual <= fechaLimite){
        var dia = fechaActual.getDay()
        if(diasSemanaPermitidos.includes(dia)){
            var partesInicio = intervalo.inicio.split(":");
            var partesFin = intervalo.fin.split(":");
            var inicioSegs = parseInt(partesInicio[0])*3600 + parseInt(partesInicio[1])*60;
            var finSegs = parseInt(partesFin[0])*3600 + parseInt(partesFin[1])*60;

            if(fechaActual.toDateString() == ahora.toDateString()){
                var ahoraSegs = ahora.getHours()*3600 + ahora.getMinutes()*60 + ahora.getSeconds();
                inicioSegs = Math.max(inicioSegs, ahoraSegs);
            }

            if(inicioSegs < finSegs){
                totalSegs += finSegs - inicioSegs;
            }
        }
        fechaActual.setDate(fechaActual.getDate()+1);
    }
    return totalSegs;
}

// Variable global para reloj de intervalos
var grupoActual = "";
var segundosIntervalo = 0;

// Función al pulsar Entrar o Enter
function iniciar(){
    var nombreInput = document.getElementById("nombre").value;
    var nombre = nombreInput.toLowerCase();
    var encontrado = false;

    for(var persona in lista){
        if(similitud(nombre, persona) >= 0.9){
            encontrado = true;
            document.getElementById("mensaje").innerText = lista[persona];

            if(["carla","zuri","atteneri"].includes(persona)){
                grupoActual = "1_2";
            } else if(["ainara","sara","isis","marta","aitana","leire","sofia","helena","elena","alicia","javi","martina"].includes(persona)){
                grupoActual = "3_4_5_6";
            }

            // Mostrar textos y relojes
            document.getElementById("contadorTitulo").style.display="block";
            document.getElementById("contador").style.display="block";
            document.getElementById("intervaloTitulo").style.display="block";
            document.getElementById("relojIntervalo").style.display="block";

            // Calcular segundos totales iniciales
            segundosIntervalo = 0;
            intervalosGrupos[grupoActual].forEach(function(intervalo){
                segundosIntervalo += segundosRestantesIntervalos(new Date(fechaObjetivo), intervalo.dias, intervalo);
            });
            document.getElementById("relojIntervalo").innerText = segundosAHHMMSS(segundosIntervalo);
            return;
        }
    }

    if(!encontrado){
        document.getElementById("mensaje").innerText = "El nombre '" + nombreInput + "' no está en la lista";
        // Ocultar relojes y textos
        document.getElementById("contadorTitulo").style.display="none";
        document.getElementById("contador").style.display="none";
        document.getElementById("intervaloTitulo").style.display="none";
        document.getElementById("relojIntervalo").style.display="none";
    }
}

// Listener para Enter
document.getElementById("nombre").addEventListener("keyup", function(event){
    if(event.key === "Enter"){
        iniciar();
    }
});

// Cuenta atrás normal
function actualizar(){
    var ahora = new Date()
    var diferencia = fechaObjetivo - ahora.getTime()
    var dias = Math.floor(diferencia / (1000*60*60*24))
    var horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60))
    var minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60))
    var segundos = Math.floor((diferencia % (1000*60)) / 1000)
    document.getElementById("contador").innerText = dias + "d " + horas + "h " + minutos + "m " + segundos + "s"
}
setInterval(actualizar,1000);

// Función para verificar si estamos dentro de un intervalo
function dentroIntervalo(grupo){
    var ahora = new Date();
    var dia = ahora.getDay();
    var segundosHoy = ahora.getHours()*3600 + ahora.getMinutes()*60 + ahora.getSeconds();

    var intervalos = intervalosGrupos[grupo];
    for(var i=0;i<intervalos.length;i++){
        if(intervalos[i].dias.includes(dia)){
            var partesInicio = intervalos[i].inicio.split(":");
            var partesFin = intervalos[i].fin.split(":");
            var inicioSegs = parseInt(partesInicio[0])*3600 + parseInt(partesInicio[1])*60;
            var finSegs = parseInt(partesFin[0])*3600 + parseInt(partesFin[1])*60;
            if(segundosHoy >= inicioSegs && segundosHoy <= finSegs){
                return true;
            }
        }
    }
    return false;
}

// Reloj de intervalos que baja solo durante los intervalos
setInterval(function(){
    if(segundosIntervalo > 0 && dentroIntervalo(grupoActual)){
        segundosIntervalo--;
        document.getElementById("relojIntervalo").innerText = segundosAHHMMSS(segundosIntervalo);
    }
},1000);

</script>
</body>
</html>
