<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cuenta Atras</title>

<style>

body{
    background:#0b0b0f;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:80px;
}

input{
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 15px;
    font-size:16px;
}

.reloj{
    font-size:70px;
    letter-spacing:4px;
    margin-top:40px;
}

.intervalo{
    font-size:35px;
    margin-top:20px;
    color:#00e5ff;
}

#mensaje{
    margin-top:20px;
    font-size:20px;
    color:#ffd54f;
}

</style>

</head>

<body>

<h2>Reloj</h2>

<input id="nombre" placeholder="Tu nombre">
<button onclick="iniciar()">Entrar</button>

<div id="mensaje"></div>

<div class="reloj" id="reloj"></div>

<div class="intervalo" id="contador"></div>

<script>

var fechaObjetivo = new Date("March 28, 2026 13:00:00").getTime()

function iniciar(){

    var nombre = document.getElementById("nombre").value.toLowerCase()

    var lista = {
        "ana":"Bienvenida Ana",
        "luis":"Luis tiene acceso al reloj especial",
        "pedro":"Pedro desbloqueó el mensaje secreto"
    }

    if(lista[nombre]){
        document.getElementById("mensaje").innerText = lista[nombre]
    } else {
        document.getElementById("mensaje").innerText = ""
    }

}

function actualizar(){

    var ahora = new Date()

    var h = ahora.getHours().toString().padStart(2,'0')
    var m = ahora.getMinutes().toString().padStart(2,'0')
    var s = ahora.getSeconds().toString().padStart(2,'0')

    document.getElementById("reloj").innerText = h + ":" + m + ":" + s

    var diferencia = fechaObjetivo - ahora.getTime()

    var dias = Math.floor(diferencia / (1000*60*60*24))
    var horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60))
    var minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60))
    var segundos = Math.floor((diferencia % (1000*60)) / 1000)

    document.getElementById("contador").innerText =
    dias + "d " + horas + "h " + minutos + "m " + segundos + "s"

}

setInterval(actualizar,1000)

</script>

</body>
</html>
