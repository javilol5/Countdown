<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cuenta atrás</title>

<style>

body{
    background:#0f0f14;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container{
    margin-top:40px;
}

input{
    padding:8px;
    font-size:16px;
}

button{
    padding:8px 15px;
    font-size:16px;
}

.clock{
    width:200px;
    height:200px;
    border:6px solid white;
    border-radius:50%;
    margin:40px auto;
    position:relative;
}

.hand{
    position:absolute;
    bottom:50%;
    left:50%;
    transform-origin:bottom;
    background:white;
}

.hour{
    width:6px;
    height:50px;
}

.minute{
    width:4px;
    height:70px;
}

.second{
    width:2px;
    height:90px;
    background:red;
}

#intervalo{
    font-size:30px;
}

</style>
</head>

<body>

<div class="container">

<h2>Cuenta atrás</h2>

<input id="nombre" placeholder="Tu nombre">
<button onclick="iniciar()">Empezar</button>

<p id="mensaje"></p>

<div class="clock">

<div id="hora" class="hand hour"></div>
<div id="min" class="hand minute"></div>
<div id="seg" class="hand second"></div>

</div>

<h2>Tiempo hasta 28 marzo 13:00</h2>

<div id="intervalo"></div>

</div>

<script>

var fechaObjetivo = new Date("March 28, 2026 13:00:00").getTime()

function iniciar(){

    var nombre = document.getElementById("nombre").value

    var lista = {
        "ana":"Bienvenida Ana",
        "luis":"Hola Luis, tu reloj especial está activo",
        "pedro":"Pedro tiene acceso al mensaje secreto"
    }

    if(lista[nombre]){
        document.getElementById("mensaje").innerText = lista[nombre]
    }

}

setInterval(function(){

    var ahora = new Date()

    var h = ahora.getHours()
    var m = ahora.getMinutes()
    var s = ahora.getSeconds()

    var horaDeg = (h % 12) * 30
    var minDeg = m * 6
    var segDeg = s * 6

    document.getElementById("hora").style.transform =
    "translateX(-50%) rotate(" + horaDeg + "deg)"

    document.getElementById("min").style.transform =
    "translateX(-50%) rotate(" + minDeg + "deg)"

    document.getElementById("seg").style.transform =
    "translateX(-50%) rotate(" + segDeg + "deg)"

    var diferencia = fechaObjetivo - ahora.getTime()

    var dias = Math.floor(diferencia / (1000*60*60*24))
    var horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60))
    var minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60))
    var segundos = Math.floor((diferencia % (1000*60)) / 1000)

    document.getElementById("intervalo").innerText =
    dias+"d "+horas+"h "+minutos+"m "+segundos+"s"

},1000)

</script>

</body>
</html>
