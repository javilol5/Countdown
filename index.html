<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reloj y cuenta atrás</title>
<style>
body{
    background:#0b0b0f;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:80px;
}
input{
    padding:10px;
    font-size:16px;
}
button{
    padding:10px 15px;
    font-size:16px;
}
.reloj{
    font-size:70px;
    letter-spacing:4px;
    margin-top:40px;
}
.intervalo{
    font-size:35px;
    margin-top:20px;
    color:#00e5ff;
}
#mensaje{
    margin-top:20px;
    font-size:20px;
    color:#ffd54f;
}
#contadorExtra{
    font-size:25px;
    margin-top:15px;
    color:#ff6f00;
}
</style>
</head>
<body>

<h2>Reloj Digital y Cuenta Atrás</h2>

<input id="nombre" placeholder="Tu nombre">
<button onclick="iniciar()">Entrar</button>

<div id="mensaje"></div>
<div class="reloj" id="reloj"></div>
<div class="intervalo" id="contador"></div>
<div class="intervalo" id="contadorExtra"></div>

<script>
// Fecha objetivo
var fechaObjetivo = new Date("March 28, 2026 13:00:00").getTime()

// Lista de nombres y mensajes
var lista = {
    "carla":"Carla, Zuri y Atteneri",
    "zuri":"Carla, Zuri y Atteneri",
    "atteneri":"Carla, Zuri y Atteneri",

    "claudia":"Claudia, Candela y Martina",
    "candela":"Claudia, Candela y Martina",
    "martina":"Claudia, Candela y Martina",

    "ainara":"Ainara, Sara e Isis",
    "sara":"Ainara, Sara e Isis",
    "isis":"Ainara, Sara e Isis",

    "marta":"Marta, Aitana y Leire",
    "aitana":"Marta, Aitana y Leire",
    "leire":"Marta, Aitana y Leire",

    "sofia":"Sofia, Helena y Alicia",
    "helena":"Sofia, Helena y Alicia",
    "elena":"Sofia, Helena y Alicia",
    "alicia":"Sofia, Helena y Alicia",

    "javi":"Javi y Martina"
}

// Intervalos para grupo 1 (lunes a viernes 18:00 a 21:00)
var intervalosGrupo1 = [
    {inicio:"2026-03-22", fin:"2026-03-26"}, // ejemplo de lunes a viernes
    {inicio:"2026-03-29", fin:"2026-04-02"}  // otro lunes a viernes
]

// Función para contar días de semana entre dos fechas
function diasSemana(inicio, fin){
    var count = 0
    var fecha = new Date(inicio)
    var fechaFin = new Date(fin)
    while(fecha <= fechaFin){
        var dia = fecha.getDay() // 0=domingo,6=sabado
        if(dia != 0 && dia != 6){
            count++
        }
        fecha.setDate(fecha.getDate()+1)
    }
    return count
}

// Sumar todos los días de semana de los intervalos del grupo 1
function sumaIntervalosGrupo1(){
    var suma = 0
    for(var i=0;i<intervalosGrupo1.length;i++){
        suma += diasSemana(intervalosGrupo1[i].inicio, intervalosGrupo1[i].fin)
    }
    return suma
}

// Función Levenshtein para calcular similitud
function similitud(a,b){
    var distancia = levenshtein(a,b)
    var max = Math.max(a.length,b.length)
    return 1 - distancia/max
}
function levenshtein(a,b){
    var matriz = []
    for(var i=0;i<=b.length;i++){matriz[i]=[i]}
    for(var j=0;j<=a.length;j++){matriz[0][j]=j}
    for(var i=1;i<=b.length;i++){
        for(var j=1;j<=a.length;j++){
            if(b.charAt(i-1)==a.charAt(j-1)){
                matriz[i][j]=matriz[i-1][j-1]
            }else{
                matriz[i][j]=Math.min(
                    matriz[i-1][j-1]+1,
                    matriz[i][j-1]+1,
                    matriz[i-1][j]+1
                )
            }
        }
    }
    return matriz[b.length][a.length]
}

// Función al pulsar Entrar
function iniciar(){
    var nombre = document.getElementById("nombre").value.toLowerCase()
    for(var persona in lista){
        var porcentaje = similitud(nombre, persona)
        if(porcentaje>=0.9){
            document.getElementById("mensaje").innerText = lista[persona]
            // Si pertenece al grupo 1, mostrar contador extra
            if(persona=="carla" || persona=="zuri" || persona=="atteneri"){
                var diasTotales = sumaIntervalosGrupo1()
                document.getElementById("contadorExtra").innerText = "Días de semana totales: " + diasTotales
            } else {
                document.getElementById("contadorExtra").innerText = ""
            }
            return
        }
    }
    document.getElementById("mensaje").innerText = ""
    document.getElementById("contadorExtra").innerText = ""
}

// Actualización cada segundo
function actualizar(){
    var ahora = new Date()
    // reloj digital
    var h = ahora.getHours().toString().padStart(2,'0')
    var m = ahora.getMinutes().toString().padStart(2,'0')
    var s = ahora.getSeconds().toString().padStart(2,'0')
    document.getElementById("reloj").innerText = h + ":" + m + ":" + s

    // cuenta atrás
    var diferencia = fechaObjetivo - ahora.getTime()
    var dias = Math.floor(diferencia / (1000*60*60*24))
    var horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60))
    var minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60))
    var segundos = Math.floor((diferencia % (1000*60)) / 1000)
    document.getElementById("contador").innerText = dias + "d " + horas + "h " + minutos + "m " + segundos + "s"
}

setInterval(actualizar,1000)
</script>
</body>
</html>
